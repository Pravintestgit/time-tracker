name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1
        with:
          tools: 'credscan, eslint, bandit, terraform'
